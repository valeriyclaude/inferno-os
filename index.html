<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#131210" />
    <title>Inferno OS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Spectral:wght@500;600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3/dist/tabler-icons.min.css" />
    <script type="module" crossorigin src="/inferno-os/assets/index-B8DIqlD9.js"></script>
    <link rel="stylesheet" crossorigin href="/inferno-os/assets/index-Z0yIHfrG.css">
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Сторож загрузки: если через 8с приложение так и не отрисовалось (iOS иногда показывает
      // «мёртвый» WebView после разворачивания Telegram) — даём кнопку перезагрузки вместо белого экрана.
      setTimeout(function () {
        var r = document.getElementById('root')
        if (r && r.children.length === 0) {
          r.innerHTML = '<div style="height:100vh;display:flex;align-items:center;justify-content:center;background:#131210;color:#c9c2b6;font-family:system-ui;text-align:center;padding:24px">' +
            '<div><div style="font-size:17px;margin-bottom:14px">Приложение не загрузилось</div>' +
            '<button onclick="location.reload()" style="background:#c96f2e;color:#171009;border:none;border-radius:11px;padding:12px 26px;font-size:14px;font-weight:600">Перезагрузить</button></div></div>'
        }
      }, 8000)
    </script>
  </body>
</html>
